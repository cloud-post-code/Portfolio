<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DocToMD — Document Converter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=JetBrains+Mono:wght@300;400;500&family=Spectral:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0e0d0b;
      --surface:   #161410;
      --border:    #2a2620;
      --amber:     #d4903a;
      --amber-dim: #8a5e22;
      --amber-glow:#f0a84a;
      --cream:     #e8dcc8;
      --muted:     #6b6355;
      --error:     #c0392b;
      --success:   #2ecc71;
      --radius:    6px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--cream);
      font-family: 'Spectral', Georgia, serif;
      font-size: 16px;
      line-height: 1.6;
      overflow: hidden;
    }

    /* Subtle paper grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      opacity: 0.6;
    }

    /* ─── Layout ─────────────────────────────── */
    .shell {
      display: grid;
      grid-template-rows: auto 1fr;
      height: 100vh;
    }

    header {
      display: flex;
      align-items: baseline;
      gap: 1.5rem;
      padding: 1.2rem 2rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--amber-glow);
    }

    header h1 span {
      color: var(--cream);
    }

    header p {
      font-size: 0.82rem;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      font-weight: 300;
    }

    .supported-tags {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
      margin-left: auto;
    }

    .tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      font-weight: 500;
      padding: 0.15rem 0.55rem;
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .workspace {
      display: grid;
      grid-template-columns: 380px 1fr;
      height: 100%;
      overflow: hidden;
    }

    /* ─── Left Panel ─────────────────────────── */
    .left-panel {
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 0;
      overflow-y: auto;
      background: var(--surface);
    }

    .section-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 1rem 1.5rem 0.5rem;
    }

    /* Drop Zone */
    .drop-zone {
      margin: 0.5rem 1.5rem 1rem;
      border: 1.5px dashed var(--border);
      border-radius: var(--radius);
      padding: 2.5rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }

    .drop-zone:hover,
    .drop-zone.dragover {
      border-color: var(--amber);
      background: rgba(212, 144, 58, 0.04);
    }

    .drop-zone.dragover .drop-icon { transform: scale(1.1) translateY(-4px); }

    .drop-icon {
      font-size: 2.2rem;
      margin-bottom: 0.75rem;
      display: block;
      transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
      filter: drop-shadow(0 0 8px rgba(212, 144, 58, 0.3));
    }

    .drop-zone p {
      font-size: 0.88rem;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      font-weight: 300;
    }

    .drop-zone p strong {
      color: var(--amber);
      font-weight: 500;
    }

    #file-input { display: none; }

    /* File Card */
    .file-card {
      margin: 0 1.5rem 1rem;
      padding: 1rem;
      background: rgba(212, 144, 58, 0.06);
      border: 1px solid var(--amber-dim);
      border-radius: var(--radius);
      display: none;
      animation: slideIn 0.3s ease;
    }

    .file-card.visible { display: block; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .file-card-name {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--amber-glow);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .file-card-meta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 0.2rem;
    }

    .file-card-clear {
      float: right;
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
      padding: 0;
      transition: color 0.15s;
    }

    .file-card-clear:hover { color: var(--cream); }

    /* Options */
    .options-block {
      padding: 0 1.5rem 1rem;
    }

    .radio-group {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }

    .radio-btn {
      flex: 1;
      position: relative;
    }

    .radio-btn input {
      position: absolute;
      opacity: 0;
      width: 0;
    }

    .radio-btn label {
      display: block;
      text-align: center;
      padding: 0.5rem 0.5rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      font-weight: 400;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
    }

    .radio-btn input:checked + label {
      border-color: var(--amber);
      color: var(--amber);
      background: rgba(212, 144, 58, 0.08);
    }

    .radio-btn label:hover {
      border-color: var(--amber-dim);
      color: var(--cream);
    }

    /* Convert Button */
    .btn-convert {
      margin: 0.5rem 1.5rem 1.5rem;
      width: calc(100% - 3rem);
      padding: 0.85rem;
      background: var(--amber);
      color: var(--bg);
      border: none;
      border-radius: var(--radius);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s, box-shadow 0.2s;
      box-shadow: 0 0 0 rgba(212, 144, 58, 0);
    }

    .btn-convert:hover:not(:disabled) {
      background: var(--amber-glow);
      box-shadow: 0 0 20px rgba(212, 144, 58, 0.25);
    }

    .btn-convert:active:not(:disabled) { transform: scale(0.98); }

    .btn-convert:disabled {
      background: var(--border);
      color: var(--muted);
      cursor: not-allowed;
    }

    .btn-convert.loading {
      position: relative;
      color: transparent;
    }

    .btn-convert.loading::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      width: 16px; height: 16px;
      margin: -8px 0 0 -8px;
      border: 2px solid var(--bg);
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Status */
    .status-bar {
      margin: 0 1.5rem 1rem;
      padding: 0.65rem 0.85rem;
      border-radius: var(--radius);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      display: none;
      animation: slideIn 0.25s ease;
    }

    .status-bar.error {
      display: block;
      background: rgba(192, 57, 43, 0.12);
      border: 1px solid rgba(192, 57, 43, 0.4);
      color: #e74c3c;
    }

    .status-bar.success {
      display: block;
      background: rgba(46, 204, 113, 0.08);
      border: 1px solid rgba(46, 204, 113, 0.3);
      color: #2ecc71;
    }

    /* Stats */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
      margin: 0 1.5rem 1.5rem;
    }

    .stat-cell {
      padding: 0.6rem 0.75rem;
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }

    .stat-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .stat-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--amber);
      margin-top: 0.1rem;
    }

    /* ─── Right Panel ────────────────────────── */
    .right-panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .preview-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.75rem 1.5rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    .preview-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .preview-filename {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.78rem;
      color: var(--amber);
      font-weight: 500;
    }

    .preview-actions {
      margin-left: auto;
      display: flex;
      gap: 0.5rem;
    }

    .btn-action {
      padding: 0.35rem 0.9rem;
      border-radius: var(--radius);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: all 0.15s;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
    }

    .btn-action:hover:not(:disabled) {
      border-color: var(--amber-dim);
      color: var(--cream);
    }

    .btn-action.primary {
      background: rgba(212, 144, 58, 0.1);
      border-color: var(--amber-dim);
      color: var(--amber);
    }

    .btn-action.primary:hover:not(:disabled) {
      background: rgba(212, 144, 58, 0.2);
      color: var(--amber-glow);
    }

    .btn-action:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    /* Tab switcher */
    .tab-bar {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    .tab {
      padding: 0.5rem 1.2rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      font-weight: 400;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      user-select: none;
    }

    .tab.active {
      color: var(--amber);
      border-bottom-color: var(--amber);
    }

    .tab:hover:not(.active) { color: var(--cream); }

    /* Preview content */
    .preview-body {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    .pane {
      position: absolute;
      inset: 0;
      overflow-y: auto;
      padding: 2rem;
      display: none;
    }

    .pane.active { display: block; }

    /* Empty state */
    .empty-state {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      opacity: 0.5;
    }

    .empty-state.hidden { display: none; }

    .empty-icon {
      font-size: 3rem;
      filter: grayscale(1);
    }

    .empty-state p {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.78rem;
      color: var(--muted);
      text-align: center;
    }

    /* Raw markdown */
    #pane-raw pre {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.82rem;
      font-weight: 300;
      line-height: 1.8;
      color: var(--cream);
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* Rendered markdown */
    #pane-rendered {
      font-family: 'Spectral', Georgia, serif;
    }

    #pane-rendered h1,
    #pane-rendered h2,
    #pane-rendered h3,
    #pane-rendered h4,
    #pane-rendered h5,
    #pane-rendered h6 {
      font-family: 'Playfair Display', serif;
      color: var(--amber-glow);
      margin: 1.5em 0 0.5em;
      line-height: 1.3;
    }

    #pane-rendered h1 { font-size: 2rem; }
    #pane-rendered h2 { font-size: 1.5rem; }
    #pane-rendered h3 { font-size: 1.2rem; }

    #pane-rendered p { margin: 0.75em 0; line-height: 1.7; }

    #pane-rendered strong { color: var(--amber-glow); font-weight: 600; }
    #pane-rendered em { font-style: italic; color: var(--cream); }

    #pane-rendered code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.82em;
      background: rgba(212, 144, 58, 0.08);
      border: 1px solid var(--border);
      padding: 0.1em 0.4em;
      border-radius: 3px;
      color: var(--amber);
    }

    #pane-rendered pre {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
      overflow-x: auto;
      margin: 1em 0;
    }

    #pane-rendered pre code {
      background: none;
      border: none;
      padding: 0;
      font-size: 0.82rem;
      color: var(--cream);
    }

    #pane-rendered ul, #pane-rendered ol {
      margin: 0.5em 0 0.5em 1.5em;
    }

    #pane-rendered li { margin: 0.3em 0; }

    #pane-rendered table {
      border-collapse: collapse;
      width: 100%;
      margin: 1em 0;
      font-size: 0.9rem;
    }

    #pane-rendered th, #pane-rendered td {
      border: 1px solid var(--border);
      padding: 0.4em 0.75em;
      text-align: left;
    }

    #pane-rendered th {
      background: rgba(212, 144, 58, 0.08);
      color: var(--amber);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    #pane-rendered blockquote {
      border-left: 3px solid var(--amber-dim);
      padding-left: 1rem;
      margin: 1em 0;
      color: var(--muted);
      font-style: italic;
    }

    #pane-rendered hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2em 0;
    }

    #pane-rendered a {
      color: var(--amber);
      text-decoration: underline;
      text-decoration-color: var(--amber-dim);
    }

    /* Scrollbar styling */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <h1>Doc<span>ToMD</span></h1>
      <p>convert any document → markdown</p>
      <div class="supported-tags">
        <span class="tag">.pdf</span>
        <span class="tag">.docx</span>
        <span class="tag">.html</span>
        <span class="tag">.rtf</span>
        <span class="tag">.txt</span>
        <span class="tag">.csv</span>
        <span class="tag">.md</span>
      </div>
    </header>

    <div class="workspace">
      <!-- Left Panel -->
      <aside class="left-panel">
        <div class="section-label">Input</div>

        <div class="drop-zone" id="drop-zone">
          <span class="drop-icon">📄</span>
          <p><strong>Drop a file</strong> here</p>
          <p>or click to browse</p>
        </div>
        <input type="file" id="file-input" accept=".pdf,.docx,.doc,.txt,.html,.htm,.rtf,.md,.csv" />

        <div class="file-card" id="file-card">
          <button class="file-card-clear" id="clear-btn" title="Remove file">✕</button>
          <div class="file-card-name" id="file-name">—</div>
          <div class="file-card-meta" id="file-meta">—</div>
        </div>

        <div class="section-label">Output Mode</div>
        <div class="options-block">
          <div class="radio-group">
            <div class="radio-btn">
              <input type="radio" name="mode" id="mode-preview" value="preview" checked />
              <label for="mode-preview">Preview + Download</label>
            </div>
            <div class="radio-btn">
              <input type="radio" name="mode" id="mode-download" value="download" />
              <label for="mode-download">Direct Download</label>
            </div>
          </div>
        </div>

        <button class="btn-convert" id="convert-btn" disabled>Convert to Markdown</button>

        <div class="status-bar" id="status-bar"></div>

        <div class="stats-grid" id="stats-grid" style="display:none">
          <div class="stat-cell">
            <div class="stat-label">Lines</div>
            <div class="stat-value" id="stat-lines">—</div>
          </div>
          <div class="stat-cell">
            <div class="stat-label">Words</div>
            <div class="stat-value" id="stat-words">—</div>
          </div>
          <div class="stat-cell">
            <div class="stat-label">Chars</div>
            <div class="stat-value" id="stat-chars">—</div>
          </div>
          <div class="stat-cell">
            <div class="stat-label">Size</div>
            <div class="stat-value" id="stat-size">—</div>
          </div>
        </div>
      </aside>

      <!-- Right Panel -->
      <main class="right-panel">
        <div class="preview-header">
          <span class="preview-title">Output</span>
          <span class="preview-filename" id="output-filename"></span>
          <div class="preview-actions">
            <button class="btn-action" id="copy-btn" disabled>Copy</button>
            <button class="btn-action primary" id="download-btn" disabled>↓ Download .md</button>
          </div>
        </div>

        <div class="tab-bar">
          <div class="tab active" data-tab="raw">Raw Markdown</div>
          <div class="tab" data-tab="rendered">Rendered</div>
        </div>

        <div class="preview-body">
          <div class="empty-state" id="empty-state">
            <span class="empty-icon">🖹</span>
            <p>Drop a document on the left<br/>to see the converted Markdown here.</p>
          </div>

          <div class="pane active" id="pane-raw">
            <pre id="raw-content"></pre>
          </div>
          <div class="pane" id="pane-rendered">
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- Marked.js for rendering -->
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <script>
    marked.setOptions({ gfm: true, breaks: false });

    const dropZone    = document.getElementById('drop-zone');
    const fileInput   = document.getElementById('file-input');
    const fileCard    = document.getElementById('file-card');
    const fileNameEl  = document.getElementById('file-name');
    const fileMetaEl  = document.getElementById('file-meta');
    const clearBtn    = document.getElementById('clear-btn');
    const convertBtn  = document.getElementById('convert-btn');
    const statusBar   = document.getElementById('status-bar');
    const statsGrid   = document.getElementById('stats-grid');
    const outputFilename = document.getElementById('output-filename');
    const copyBtn     = document.getElementById('copy-btn');
    const downloadBtn = document.getElementById('download-btn');
    const rawContent  = document.getElementById('raw-content');
    const paneRendered = document.getElementById('pane-rendered');
    const emptyState  = document.getElementById('empty-state');

    let currentFile = null;
    let lastMarkdown = '';
    let lastFilename = '';

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    function setFile(file) {
      currentFile = file;
      fileNameEl.textContent = file.name;
      fileMetaEl.textContent = `${formatSize(file.size)} · ${file.name.split('.').pop().toUpperCase()}`;
      fileCard.classList.add('visible');
      convertBtn.disabled = false;
      hideStatus();
    }

    function clearFile() {
      currentFile = null;
      fileInput.value = '';
      fileCard.classList.remove('visible');
      convertBtn.disabled = true;
      clearOutput();
    }

    function clearOutput() {
      lastMarkdown = '';
      lastFilename = '';
      rawContent.textContent = '';
      paneRendered.innerHTML = '';
      outputFilename.textContent = '';
      emptyState.classList.remove('hidden');
      emptyState.style.display = '';
      copyBtn.disabled = true;
      downloadBtn.disabled = true;
      statsGrid.style.display = 'none';
      hideStatus();
    }

    function showStatus(msg, type) {
      statusBar.textContent = msg;
      statusBar.className = `status-bar ${type}`;
    }

    function hideStatus() {
      statusBar.className = 'status-bar';
    }

    function updateStats(md) {
      const lines = md.split('\n').length;
      const words = md.trim() ? md.trim().split(/\s+/).length : 0;
      const chars = md.length;
      const size  = new Blob([md]).size;

      document.getElementById('stat-lines').textContent = lines.toLocaleString();
      document.getElementById('stat-words').textContent = words.toLocaleString();
      document.getElementById('stat-chars').textContent = chars.toLocaleString();
      document.getElementById('stat-size').textContent  = formatSize(size);
      statsGrid.style.display = 'grid';
    }

    // Drop zone
    dropZone.addEventListener('click', () => fileInput.click());

    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('dragover');
    });

    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));

    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file) setFile(file);
    });

    fileInput.addEventListener('change', () => {
      if (fileInput.files[0]) setFile(fileInput.files[0]);
    });

    clearBtn.addEventListener('click', (e) => { e.stopPropagation(); clearFile(); });

    // Convert
    convertBtn.addEventListener('click', async () => {
      if (!currentFile) return;

      const mode = document.querySelector('input[name="mode"]:checked').value;

      if (mode === 'download') {
        const form = new FormData();
        form.append('file', currentFile);
        const link = document.createElement('a');
        link.href = URL.createObjectURL(new Blob([]));

        convertBtn.classList.add('loading');
        convertBtn.disabled = true;
        hideStatus();

        try {
          const resp = await fetch('/convert', { method: 'POST', body: form });
          if (!resp.ok) {
            const err = await resp.json();
            showStatus('✗ ' + err.error, 'error');
            return;
          }
          const blob = await resp.blob();
          const stem = currentFile.name.replace(/\.[^.]+$/, '');
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `${stem}.md`;
          a.click();
          URL.revokeObjectURL(url);
          showStatus('✓ Downloaded successfully', 'success');
        } catch (err) {
          showStatus('✗ Network error: ' + err.message, 'error');
        } finally {
          convertBtn.classList.remove('loading');
          convertBtn.disabled = false;
        }
        return;
      }

      // Preview mode
      const form = new FormData();
      form.append('file', currentFile);

      convertBtn.classList.add('loading');
      convertBtn.disabled = true;
      hideStatus();

      try {
        const resp = await fetch('/convert?preview=1', { method: 'POST', body: form });
        const data = await resp.json();

        if (!resp.ok) {
          showStatus('✗ ' + data.error, 'error');
          return;
        }

        lastMarkdown = data.content;
        lastFilename = data.filename;

        rawContent.textContent = lastMarkdown;
        paneRendered.innerHTML = marked.parse(lastMarkdown);

        outputFilename.textContent = lastFilename;
        emptyState.style.display = 'none';
        copyBtn.disabled = false;
        downloadBtn.disabled = false;
        showStatus('✓ Converted successfully', 'success');
        updateStats(lastMarkdown);
      } catch (err) {
        showStatus('✗ Network error: ' + err.message, 'error');
      } finally {
        convertBtn.classList.remove('loading');
        convertBtn.disabled = false;
      }
    });

    // Download from preview
    downloadBtn.addEventListener('click', () => {
      if (!lastMarkdown) return;
      const blob = new Blob([lastMarkdown], { type: 'text/markdown' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = lastFilename;
      a.click();
      URL.revokeObjectURL(url);
    });

    // Copy
    copyBtn.addEventListener('click', async () => {
      if (!lastMarkdown) return;
      await navigator.clipboard.writeText(lastMarkdown);
      const orig = copyBtn.textContent;
      copyBtn.textContent = 'Copied!';
      setTimeout(() => { copyBtn.textContent = orig; }, 1500);
    });

    // Tabs
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(`pane-${tab.dataset.tab}`).classList.add('active');
      });
    });

    // Paste anywhere
    document.addEventListener('paste', (e) => {
      const file = Array.from(e.clipboardData.files)[0];
      if (file) setFile(file);
    });
  </script>
</body>
</html>
