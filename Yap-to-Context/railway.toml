# https://docs.railway.com/guides/config-as-code
# Add a PostgreSQL service and link it so DATABASE_URL is injected on this service.
# Migrations run on boot via src/instrumentation.ts (idempotent). Local CLI: npm run db:migrate
# Required Variables: OPENAI_API_KEY, AUTH_SECRET. AUTH_SECRET is the only sign-in password (boot fails without it in production).
# Mount a volume on `/data` if you use file-based audio storage (AUDIO_STORAGE_PATH defaults to /data/audio in production).

[deploy]
healthcheckPath = "/api/auth/status"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
